services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pdf_kb
      POSTGRES_USER: pdf_kb
      POSTGRES_PASSWORD: pdf_kb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdf_kb -d pdf_kb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
